<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      @keyframes spin {
        from { transform: rotate(0deg);   transform-origin: 16px 16px; }
        to   { transform: rotate(360deg); transform-origin: 16px 16px; }
      }
      @keyframes spinR {
        from { transform: rotate(0deg);    transform-origin: 16px 16px; }
        to   { transform: rotate(-360deg); transform-origin: 16px 16px; }
      }
      @keyframes corePulse {
        0%, 100% { r: 1.8px; opacity: 1; }
        50%       { r: 2.4px; opacity: 0.75; }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.18; }
        50%       { opacity: 0.38; }
      }

      .outer-hex  { animation: spinR 8s linear infinite; }
      .spokes     { animation: spinR 8s linear infinite; }
      .inner-hex  { animation: spin  5s linear infinite; }
      .petals     { animation: spin  5s linear infinite; }
      .core-ring  { animation: pulse  2s ease-in-out infinite; }
      .core-dot   { animation: corePulse 2s ease-in-out infinite; }
      .bg-glow    { animation: glowPulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- White background -->
  <rect width="32" height="32" rx="7" fill="white"/>

  <!-- Ambient glow behind everything -->
  <circle class="bg-glow" cx="16" cy="16" r="13" fill="url(#outerGlow)"/>

  <!-- Outer hexagon — counter-rotates -->
  <g class="outer-hex">
    <polygon points="16,1.5 29,8.75 29,23.25 16,30.5 3,23.25 3,8.75"
             fill="none" stroke="#4f46e5" stroke-width="1.4" opacity="0.7"/>
  </g>

  <!-- Spokes — counter-rotates with outer hex -->
  <g class="spokes">
    <line x1="16"  y1="1.5"   x2="16"  y2="7.5"  stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
    <line x1="29"  y1="8.75"  x2="24"  y2="11.5" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
    <line x1="29"  y1="23.25" x2="24"  y2="20.5" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
    <line x1="16"  y1="30.5"  x2="16"  y2="24.5" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
    <line x1="3"   y1="23.25" x2="8"   y2="20.5" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
    <line x1="3"   y1="8.75"  x2="8"   y2="11.5" stroke="#818cf8" stroke-width="0.9" opacity="0.6"/>
  </g>

  <!-- Inner hexagon + petals — co-rotates -->
  <g class="inner-hex">
    <polygon points="16,7.5 24,12 24,21 16,25.5 8,21 8,12"
             fill="none" stroke="#6366f1" stroke-width="1" opacity="0.55"/>
  </g>
  <g class="petals" filter="url(#glow)">
    <polygon points="16,10.5 18.5,15 13.5,15" fill="#6366f1" opacity="0.9"/>
    <polygon points="22,19.5 17,18 19.5,23"   fill="#6366f1" opacity="0.9"/>
    <polygon points="10,19.5 12.5,23 8,18"    fill="#6366f1" opacity="0.9"/>
  </g>

  <!-- Core ring — pulses -->
  <circle class="core-ring" cx="16" cy="16" r="5.5"
          fill="white" stroke="#6366f1" stroke-width="1.3"/>

  <!-- Core gradient fill -->
  <circle cx="16" cy="16" r="4" fill="url(#core)" filter="url(#softGlow)"/>

  <!-- Center dot — breathes -->
  <circle class="core-dot" cx="16" cy="16" r="1.8" fill="white"/>
</svg>
